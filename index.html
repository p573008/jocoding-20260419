
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌞</button>
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn" class="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xlgalavq" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="contact@example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 제안 내용을 상세히 입력해주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
